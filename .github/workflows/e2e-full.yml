name: Full E2E

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: full-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:full
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-${{ github.run_attempt }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
